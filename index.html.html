// ==========================================
// ✅ CEK ID AKUN REAL + CORS PROXY
// ==========================================
async function checkAccountId(){
    const g = findG(ST.gm);
    if(!g) return;
    ST._checking = true;
    ST._checkResult = null;
    ST._checkData = null;
    render();

    try {
        if(ST.gm === 'ml') {
            const uid = (ST.fd.uid||'').trim();
            const zid = (ST.fd.zid||'').trim();
            if(!uid || !zid) { ST._checkResult={ok:false,msg:'User ID & Zone ID wajib diisi'}; ST._checking=false; render(); return; }
            
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent('https://account.moonton.com/api/loginbase/login');
            const res = await fetch(proxyUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ uid: Number(uid), sid: Number(zid), plat_id: 2 })
            });
            const data = await res.json();
            
            if(data.code === 0 && data.data) {
                ST._checkResult = {ok:true, msg:'Akun ditemukan!'};
                ST._checkData = {Username: data.data.name, ID: uid+' ('+zid+')'};
            } else {
                ST._checkResult = {ok:false, msg:'ID/Zone Tidak Ditemukan!'};
            }
        } 
        else if(ST.gm === 'freefire') {
            const uid = (ST.fd.uid||'').trim();
            if(!uid || isNaN(uid)) { ST._checkResult={ok:false,msg:'UID harus angka'}; ST._checking=false; render(); return; }
            
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent('https://fffreefire.github.io/api/check?uid='+uid);
            const res = await fetch(proxyUrl);
            const data = await res.json();
            
            if(data.status === 200 && data.data) {
                ST._checkResult = {ok:true, msg:'Akun ditemukan!'};
                ST._checkData = {Nickname: data.data.name, Level: data.data.level, UID: uid};
            } else {
                ST._checkResult = {ok:false, msg:'UID Tidak Ditemukan!'};
            }
        }
        else if(ST.gm === 'roblox') {
            const u = (ST.fd.user||'').trim();
            if(u.length<3){ST._checkResult={ok:false,msg:'Username minimal 3 karakter'};ST._checking=false;render();return}
            const res = await fetch('https://users.roblox.com/v1/usernames/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usernames:[u],excludeBannedUsers:false})});
            const data = await res.json();
            if(data.data&&data.data.length>0){const r=data.data[0];ST._checkResult={ok:true,msg:'Username ditemukan!'};ST._checkData={ID:r.id,Username:r.name}}else{ST._checkResult={ok:false,msg:'Username TIDAK DITEMUKAN!'}}
        }
        else if(ST.gm === 'pubg') {
            const cid = (ST.fd.cid||'').trim();
            if(!cid || isNaN(cid)) { ST._checkResult={ok:false,msg:'Character ID harus angka'}; ST._checking=false; render(); return; }
            ST._checkResult = {ok:true, msg:'ID diterima, silakan cek nama di game!'};
            ST._checkData = {CharacterID: cid, Info: 'Pastikan nama sesuai saat login game'};
        }
        else if(ST.gm === 'token') {
            const m = (ST.fd.meter||'').trim();
            if(m.length < 11 || m.length > 12 || isNaN(m)) { ST._checkResult={ok:false,msg:'Nomor meter harus 11-12 digit angka'}; ST._checking=false; render(); return; }
            ST._checkResult = {ok:true, msg:'Format nomor meter valid!'};
            ST._checkData = {NoMeter: m, Info: 'Nama & daya dicek admin saat proses'};
        }
    } catch(e) {
        console.error(e);
        ST._checkResult = {ok:false, msg:'Gagal cek (CORS/Server). Pastikan ID benar & lanjutkan.'};
    }
    
    ST._checking = false;
    render();
}

function adminLogin(){return '<div class="min-h-screen flex items-center justify-center px-4" style="background:radial-gradient(ellipse,#0f0f2a,#050508)"><div class="rounded-2xl p-7 w-full max-w-sm afu" style="border:1px solid #ffffff08;background:#0a0a12"><div class="text-center mb-6"><div class="w-14 h-14 rounded-xl bg-gradient-to-br from-cyan-400 to-emerald-400 flex items-center justify-center mx-auto mb-3"><i class="fas fa-shield-halved text-xl text-dark-950"></i></div><h1 class="font-display font-bold text-lg text-white">Admin</h1></div><input type="password" id="apass" class="inp" placeholder="Password" onkeydown="if(event.key===\'Enter\')doLogin()"><button onclick="doLogin()" class="btn-n w-full mt-3">Masuk</button><button onclick="go(\'home\')" class="btn-o w-full mt-2">Kembali</button></div></div>'}
function doLogin(){if(document.getElementById('apass')?.value===DB.s.ap){DB.admin=1;toast('Login OK','s');render()}else toast('Salah','e')}
function adminDash(){const tabs=[{id:'products',i:'fa-box',l:'Kelola Harga'},{id:'orders',i:'fa-receipt',l:'Pesanan'},{id:'settings',i:'fa-gear',l:'Setting'}];return '<div class="flex min-h-screen"><aside class="aside '+(ST.as?'op':'cl')+'"><div class="p-3 border-b border-white/5"><span class="font-display font-bold text-xs neon-t">ADMIN</span></div><div class="py-1">'+tabs.map(t=>'<div class="am '+(ST.at===t.id?'on':'')+'" onclick="ST.at=\''+t.id+'\';render()"><i class="fas '+t.i+' w-5 text-center text-sm"></i><span>'+t.l+'</span></div>').join('')+'</div><div class="absolute bottom-0 left-0 right-0 p-3 border-t border-white/5"><button onclick="DB.admin=0;go(\'home\')" class="text-xs text-gray-600 hover:text-red-400"><i class="fas fa-sign-out-alt mr-1"></i>Logout</button></div></aside><div class="flex-1 md:ml-[220px] p-4 md:p-6"><div class="flex items-center justify-between mb-5"><div class="flex items-center gap-2"><button onclick="ST.as=!ST.as;render()" class="md:hidden text-gray-400"><i class="fas fa-bars"></i></button><h1 class="font-display font-bold text-lg text-white">'+(tabs.find(t=>t.id===ST.at)?.l||'')+'</h1></div><button onclick="go(\'home\')" class="btn-o text-xs py-1.5">Website</button></div>'+(!ST._dbConnected?'<div class="p-3 rounded bg-red-400/10 border border-red-400/20 text-red-400 text-xs mb-4"><i class="fas fa-database mr-1"></i><b>Mode Lokal (Firebase Belum Konek)</b> - Data hanya tersimpan di browser ini.</div>':'')+adminContent()+'</div></div>'}
function adminContent(){switch(ST.at){case 'products':return admProducts();case 'orders':return admOrders();case 'settings':return admSettings();default:return admProducts()}}

function admProducts(){const gid=ST._pg||'freefire';const g=findG(gid);const ps=DB.p[gid]||[];const tp=ps.filter(p=>p.on).reduce((a,p)=>a+(p.j-p.m),0);let ec='';if(gid==='roblox')ec='<th>GP</th>';if(gid==='token')ec='<th>Denom</th>';
return '<div class="flex flex-wrap gap-2 mb-4">'+DB.g.map(g=>'<button onclick="ST._pg=\''+g.id+'\';render()" class="text-xs py-2 px-3 rounded-lg border '+(gid===g.id?'border-neon bg-neon/10 text-neon':'border-white/10 text-gray-500')+'"><i class="fas '+g.ic+' mr-1"></i>'+g.n+'</button></div>')+'</div><div class="rounded-xl p-4 border border-white/5 bg-dark-800"><div class="flex justify-between mb-3"><div><h3 class="text-white text-sm">'+(g?g.n:'')+'</h3><p class="text-[10px] text-gray-600">Profit/item: <b class="text-emerald-400">'+Rp(tp)+'</b></p></div><button onclick="addProd(\''+gid+'\')" class="btn-n text-xs py-1.5 px-3">+ Tambah</button></div><div class="overflow-x-auto"><table class="tbl"><thead><tr><th>Nama</th><th>Modal</th><th>Jual</th><th>Profit</th>'+ec+'<th>On</th><th></th></tr></thead><tbody>'+ps.map((p,i)=>{const pf=p.j-p.m;let et='';if(gid==='roblox')et='<td><input type="number" class="inp-sm w-20" value="'+(p.gpPrice||'')+'" onchange="updProd(\''+gid+'\','+i+',\'gpPrice\',+this.value)"></td>';if(gid==='token')et='<td><input type="number" class="inp-sm w-24" value="'+(p.denom||'')+'" onchange="updProd(\''+gid+'\','+i+',\'denom\',+this.value)"></td>';return '<tr><td><input class="inp-sm" value="'+esc(p.n)+'" onchange="updProd(\''+gid+'\','+i+',\'n\',this.value)"></td><td><input type="number" class="inp-sm w-24" value="'+p.m+'" onchange="updProd(\''+gid+'\','+i+',\'m\',+this.value)"></td><td><input type="number" class="inp-sm w-28" value="'+p.j+'" onchange="updProd(\''+gid+'\','+i+',\'j\',+this.value)" style="border-color:'+(pf<0?'#FF444440':'#00D4FF20')+'"></td><td class="'+(pf<0?'text-red-400':'text-emerald-400')+' font-bold text-xs">'+Rp(pf)+'</td>'+et+'<td><input type="checkbox" '+(p.on?'checked':'')+' onchange="updProd(\''+gid+'\','+i+',\'on\',this.checked?1:0)"></td><td><button onclick="delProd(\''+gid+'\','+i+')" class="text-red-400 text-xs"><i class="fas fa-trash"></i></button></td></tr>'}).join('')+'</tbody></table></div></div>'}
async function updProd(gid,idx,field,val){DB.p[gid][idx][field]=val;render();await saveProducts(gid)}
async function addProd(gid){if(!DB.p[gid])DB.p[gid]=[];DB.p[gid].push({n:'Baru',m:0,j:0,on:1,gp:gid==='roblox'?50:0,gpPrice:gid==='roblox'?72:0,gpCount:1,denom:gid==='token'?20000:0});await saveProducts(gid);render();toast('+ Ditambah','i')}
async function delProd(gid,idx){if(confirm('Hapus?')){DB.p[gid].splice(idx,1);await saveProducts(gid);render();toast('Dihapus','s')}}

function admOrders(){const os=DB.o||[];const sc={pending:['text-yellow-400','Tunggu'],processing:['text-blue-400','Proses'],success:['text-emerald-400','OK'],failed:['text-red-400','Gagal']};const ts=os.filter(o=>o.st==='success').reduce((a,o)=>a+o.sell,0);const tp=os.filter(o=>o.st==='success').reduce((a,o)=>a+o.profit,0);
return '<div class="grid grid-cols-3 gap-3 mb-4">'+[{l:'Transaksi',v:os.length},{l:'Penjualan',v:Rp(ts)},{l:'Profit',v:Rp(tp)}].map(s=>'<div class="rounded-xl p-3 bg-dark-800 border border-white/5"><p class="text-gray-500 text-[10px]">'+s.l+'</p><p class="text-white font-bold text-lg">'+s.v+'</p></div>').join('')+'</div><div class="rounded-xl p-4 border border-white/5 bg-dark-800">'+(os.length===0?'<p class="text-gray-600 text-xs">Belum ada</p>':'<div class="overflow-x-auto"><table class="tbl"><thead><tr><th>Kode</th><th>Game</th><th>Produk</th><th>Total</th><th>Profit</th><th>Status</th><th>Aksi</th></tr></thead><tbody>'+os.map(o=>{const s=sc[o.st]||sc.pending;return '<tr><td class="text-amber-400 font-mono text-xs">'+o.code+'</td><td class="text-white text-xs">'+o.gn+'</td><td class="text-white text-xs">'+o.pn+'</td><td class="text-neon text-xs">'+Rp(o.sell)+'</td><td class="text-emerald-400 text-xs">'+Rp(o.profit)+'</td><td class="'+s[0]+' text-xs">'+s[1]+'</td><td><select onchange="updOrder(\''+o.id+'\',this.value)" class="inp-sm w-auto">'+['pending','processing','success','failed'].map(st=>'<option value="'+st+'" '+(o.st===st?'selected':'')+'>'+sc[st][1]+'</option>').join('')+'</select></td></tr>'}).join('')+'</tbody></table></div>')+'</div>'}
async function updOrder(oid,st){const o=DB.o.find(x=>x.id===oid);if(o){o.st=st;render();await updateOrderInDB(oid,{st});toast('Status diubah','s')}}

function admSettings(){return '<div class="space-y-4"><div class="rounded-xl p-4 border border-white/5 bg-dark-800"><h3 class="text-white text-sm mb-3"><i class="fab fa-whatsapp mr-2 text-emerald-400"></i>WhatsApp</h3><input id="s-wa" class="inp text-sm mb-2" value="'+esc(DB.s.wa)+'"><button onclick="DB.s.wa=document.getElementById(\'s-wa\').value;saveSettings();toast(\'OK\',\'s\')" class="btn-n text-xs">Simpan</button></div><div class="rounded-xl p-4 border border-white/5 bg-dark-800"><h3 class="text-white text-sm mb-3"><i class="fas fa-qrcode mr-2 text-cyan-400"></i>QRIS (Link Gambar)</h3><input id="s-qr" class="inp text-sm mb-2" value="'+esc(DB.s.qr)+'"><div class="bg-white rounded-xl p-3 inline-block mt-2"><img src="'+DB.s.qr+'" class="w-40 h-40 object-contain rounded" onerror="this.src=\'https://via.placeholder.com/300?text=QR+Error\'"></div><br><button onclick="DB.s.qr=document.getElementById(\'s-qr\').value;saveSettings();toast(\'OK\',\'s\')" class="btn-n text-xs mt-2">Simpan</button></div><div class="rounded-xl p-4 border border-white/5 bg-dark-800"><h3 class="text-white text-sm mb-3"><i class="fas fa-building-columns mr-2 text-yellow-400"></i>Bank</h3><div class="grid grid-cols-3 gap-2 mb-2"><input id="s-bn" class="inp text-sm" value="'+esc(DB.s.bank_name)+'"><input id="s-bno" class="inp text-sm" value="'+esc(DB.s.bank_no)+'"><input id="s-bh" class="inp text-sm" value="'+esc(DB.s.bank_holder)+'"></div><button onclick="DB.s.bank_name=document.getElementById(\'s-bn\').value;DB.s.bank_no=document.getElementById(\'s-bno\').value;DB.s.bank_holder=document.getElementById(\'s-bh\').value;saveSettings();toast(\'OK\',\'s\')" class="btn-n text-xs">Simpan</button></div><div class="rounded-xl p-4 border border-white/5 bg-dark-800"><h3 class="text-white text-sm mb-3"><i class="fas fa-lock mr-2 text-neon"></i>Password Admin</h3><div class="flex gap-2"><input type="password" id="npass" class="inp text-sm flex-1" placeholder="Baru"><button onclick="const p=document.getElementById(\'npass\')?.value;if(p&&p.length>=4){DB.s.ap=p;saveSettings();toast(\'OK\',\'s\')}else toast(\'Min 4 karakter\',\'e\')" class="btn-n text-xs">Ubah</button></div></div></div>'}

function render(){const app=document.getElementById('app');ST._code=ST._code||mkCode();switch(ST.pg){case 'home':app.innerHTML=pgHome();break;case 'topup':app.innerHTML=pgTopup();break;case 'tutorial':app.innerHTML=pgTutorial();break;case 'history':app.innerHTML=pgHistory();break;case 'faq':app.innerHTML=pgFaq();break;case 'admin':app.innerHTML=pgAdmin();break;default:app.innerHTML=pgHome()}}

// ===================== INIT =====================
window.addEventListener('DOMContentLoaded', async function() {
    // Load Local Storage first
    loadLocal();

    var ld = document.getElementById('ld');
    if(ld) { ld.classList.add('hide'); setTimeout(() => ld.remove(), 500); }

    const connected = initFirebase();
    if(connected) {
        await loadDatabase();
        try { db.collection('orders').orderBy('dt','desc').limit(50).onSnapshot(snap=>{DB.o=[];snap.forEach(d=>DB.o.push(d.data()));if(ST.pg==='admin')render()}) } catch(e){}
    } else {
        toast('Mode Offline - Firebase belum dikonfigurasi','i');
    }

    render();
    setInterval(function(){if(ST.pg==='home'){var bn=DB.s.bn.filter(b=>b.on);if(bn.length>1){ST.bi=(ST.bi+1)%bn.length;var t=document.getElementById('bt');if(t)t.style.transform='translateX(-'+ST.bi*100+'%)'}}},5000);
});
</script>
</body>
</html>
