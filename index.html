function doLogin(){if(document.getElementById('apass')?.value===SETTINGS.ap){DB.admin=1;toast('Login OK','s');render()}else toast('Password Salah','e')}
function adminDash(){return '<div class="flex min-h-screen"><aside class="aside '+(ST.as?'op':'cl')+'"><div class="p-3 border-b border-white/5"><span class="font-display font-bold text-xs neon-t">ADMIN GABBSTORE</span></div><div class="py-1"><div class="am '+(ST.at==='orders'?'on':'')+'" onclick="ST.at=\'orders\';render()"><i class="fas fa-receipt w-5 text-center text-sm"></i><span>Pesanan</span></div></div><div class="absolute bottom-0 left-0 right-0 p-3 border-t border-white/5"><button onclick="DB.admin=0;go(\'home\')" class="text-xs text-gray-600 hover:text-red-400"><i class="fas fa-sign-out-alt mr-1"></i>Logout</button></div></aside><div class="flex-1 md:ml-[220px] p-4 md:p-6"><div class="flex items-center justify-between mb-5"><div class="flex items-center gap-2"><button onclick="ST.as=!ST.as;render()" class="md:hidden text-gray-400"><i class="fas fa-bars"></i></button><h1 class="font-display font-bold text-lg text-white">Pesanan Masuk</h1></div><button onclick="go(\'home\')" class="btn-o text-xs py-1.5">Lihat Website</button></div>'+admOrders()+'</div></div>'}

function admOrders(){const os=DB.o||[];const sc={pending:['text-yellow-400','Menunggu'],processing:['text-blue-400','Diproses'],success:['text-emerald-400','Berhasil'],failed:['text-red-400','Gagal']};const ts=os.filter(o=>o.st==='success').reduce((a,o)=>a+o.sell,0);
return '<div class="grid grid-cols-2 gap-3 mb-4">'+[{l:'Total Transaksi',v:os.length},{l:'Penjualan Sukses',v:Rp(ts)}].map(s=>'<div class="rounded-xl p-3 bg-dark-800 border border-white/5"><p class="text-gray-500 text-[10px]">'+s.l+'</p><p class="text-white font-bold text-lg">'+s.v+'</p></div>').join('')+'</div><div class="rounded-xl p-4 border border-white/5 bg-dark-800">'+(os.length===0?'<p class="text-gray-600 text-xs text-center py-4">Belum ada pesanan</p>':'<div class="overflow-x-auto"><table class="tbl"><thead><tr><th>Kode</th><th>Layanan</th><th>ID/User</th><th>Produk</th><th>Total</th><th>Metode</th><th>Status</th><th>Aksi</th></tr></thead><tbody>'+os.map(o=>{const s=sc[o.st]||sc.pending;return '<tr><td class="text-amber-400 font-mono text-xs">'+o.code+'</td><td class="text-white text-xs">'+o.gn+'</td><td class="text-white text-xs">'+Object.values(o.fd).join(' | ')+'</td><td class="text-white text-xs">'+o.pn+'</td><td class="text-neon text-xs">'+Rp(o.sell)+'</td><td class="text-gray-400 text-xs">'+(o.pay==='qris'?'QRIS':o.pay==='dana'?'DANA':'BNI')+'</td><td class="'+s[0]+' text-xs">'+s[1]+'</td><td><select onchange="updOrder(\''+o.id+'\',this.value)" class="inp-sm w-auto">'+['pending','processing','success','failed'].map(st=>'<option value="'+st+'" '+(o.st===st?'selected':'')+'>'+sc[st][1]+'</option>').join('')+'</select></td></tr>'}).join('')+'</tbody></table></div>')+'</div>'}
function updOrder(oid,st){const o=DB.o.find(x=>x.id===oid);if(o){o.st=st;saveLocal();render();toast('Status diubah','s')}}

function render(){const app=document.getElementById('app');ST._code=ST._code||mkCode();switch(ST.pg){case 'home':app.innerHTML=pgHome();break;case 'topup':app.innerHTML=pgTopup();break;case 'tutorial':app.innerHTML=pgTutorial();break;case 'history':app.innerHTML=pgHistory();break;case 'admin':app.innerHTML=pgAdmin();break;default:app.innerHTML=pgHome()}}

window.addEventListener('DOMContentLoaded', function() {
    loadLocal();
    var ld = document.getElementById('ld');
    if(ld) { ld.classList.add('hide'); setTimeout(() => ld.remove(), 500); }
    render();
});
</script>
</body>
</html>
